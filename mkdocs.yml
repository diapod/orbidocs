site_name: Orbiplex Documentation
site_description: Stratified documentation for normative, project, and schema workflows.
repo_url: https://github.com/diapod/orbidocs
docs_dir: build/site-docs
site_dir: output/html

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - styles/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - awesome-nav
  - macros:
      render_by_default: false
