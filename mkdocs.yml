site_name: Orbiplex Documentation
site_description: Stratified documentation for normative, project, and schema workflows.
repo_url: https://github.com/diapod/orbidocs
docs_dir: build/site-docs
site_dir: output/html

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - macros:
      render_by_default: false

nav:
  - Overview:
      - Home: doc/normative/20-vision/pl/VISION.pl.md
      - Workflow Coverage: doc/COVERAGE.md
      - Agent Notes: AGENTS.md
