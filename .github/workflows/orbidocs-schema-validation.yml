name: Orbidocs Schema Validation

on:
  pull_request:
    paths:
      - "doc/project/60-solutions/**"
      - "doc/schemas/**"
      - "doc/schemas-gen/**"
      - "doc/COVERAGE.md"
      - "scripts/**"
      - "styles/**"
      - "Makefile"
      - "requirements-docs.txt"
      - "mkdocs.yml"
      - "mkdocs.i18n.yml"
      - "README.md"
      - "AGENTS.md"
      - "DOCS-I18N.md"
      - "TRACEABILITY.md"
      - ".github/workflows/orbidocs-schema-validation.yml"
  push:
    branches:
      - main
    paths:
      - "doc/project/60-solutions/**"
      - "doc/schemas/**"
      - "doc/schemas-gen/**"
      - "doc/COVERAGE.md"
      - "scripts/**"
      - "styles/**"
      - "Makefile"
      - "requirements-docs.txt"
      - "mkdocs.yml"
      - "mkdocs.i18n.yml"
      - "README.md"
      - "AGENTS.md"
      - "DOCS-I18N.md"
      - "TRACEABILITY.md"
      - ".github/workflows/orbidocs-schema-validation.yml"
  workflow_dispatch:

jobs:
  validate-schemas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation toolchain
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt

      - name: Verify documentation and source files do not contain local absolute paths
        run: make check-no-absolute-local-paths

      - name: Verify generated documentation artifacts
        run: |
          make docs-gen
          git diff --exit-code -- \
            doc/COVERAGE.md \
            doc/schemas-gen \
            doc/project/60-solutions/CAPABILITY-MATRIX.en.md \
            doc/project/60-solutions/CAPABILITY-MATRIX.pl.md

      - name: Validate schemas and examples
        run: make validate-schemas
