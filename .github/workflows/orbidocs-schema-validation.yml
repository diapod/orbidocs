name: Orbidocs Schema Validation

on:
  pull_request:
    paths:
      - "schemas/**"
      - "scripts/**"
      - "Makefile"
      - "README.md"
      - ".github/workflows/orbidocs-schema-validation.yml"
  push:
    paths:
      - "schemas/**"
      - "scripts/**"
      - "Makefile"
      - "README.md"
      - ".github/workflows/orbidocs-schema-validation.yml"
  workflow_dispatch:

jobs:
  json-syntax:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check JSON syntax
        run: make check-json-syntax

  schema-conformance:
    runs-on: ubuntu-latest
    needs: json-syntax

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install schema validator
        run: python -m pip install --upgrade pip check-jsonschema

      - name: Validate schemas and examples
        run: make validate-schemas
