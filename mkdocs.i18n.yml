site_name: Orbiplex Documentation
site_description: Stratified documentation for normative, project, and schema workflows.
repo_url: https://github.com/diapod/orbidocs
docs_dir: build/i18n-docs
site_dir: output/html-i18n

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - macros:
      render_by_default: false
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          site_name: Orbiplex
          theme:
            language: en
          nav:
            - Overview:
                - Home: index.md
                - Workflow Coverage: doc/COVERAGE.md
            - Normative:
                - Vision: doc/normative/20-vision/VISION.md
                - AI Manifesto: doc/normative/25-ai-manifesto/AI-MANIFESTO.md
                - Core Values: doc/normative/30-core-values/CORE-VALUES.md
                - Constitution: doc/normative/40-constitution/CONSTITUTION.md
                - Constitutional Ops:
                    - doc/normative/50-constitutional-ops/README.md
                    - Abuse Disclosure Protocol: doc/normative/50-constitutional-ops/ABUSE-DISCLOSURE-PROTOCOL.md
                    - Attestation Providers: doc/normative/50-constitutional-ops/ATTESTATION-PROVIDERS.md
                    - Autonomy Levels: doc/normative/50-constitutional-ops/AUTONOMY-LEVELS.md
                    - Entrenchment Clause: doc/normative/50-constitutional-ops/ENTRENCHMENT-CLAUSE.md
                    - Exception Policy: doc/normative/50-constitutional-ops/EXCEPTION-POLICY.md
                    - Federation Membership and Quorum: doc/normative/50-constitutional-ops/FEDERATION-MEMBERSHIP-AND-QUORUM.md
                    - FIP Membership and Quorum: doc/normative/50-constitutional-ops/FIP-MEMBERSHIP-AND-QUORUM.md
                    - Identity Attestation and Recovery: doc/normative/50-constitutional-ops/IDENTITY-ATTESTATION-AND-RECOVERY.md
                    - Identity Unsealing Board: doc/normative/50-constitutional-ops/IDENTITY-UNSEALING-BOARD.md
                    - Identity Upgrade Anomaly Signals: doc/normative/50-constitutional-ops/IDENTITY-UPGRADE-ANOMALY-SIGNALS.md
                    - Implementation Gaps: doc/normative/50-constitutional-ops/IMPLEMENTATION-GAPS.md
                    - Node Rights Card: doc/normative/50-constitutional-ops/NODE-RIGHTS-CARD.md
                    - Normative Hierarchy: doc/normative/50-constitutional-ops/NORMATIVE-HIERARCHY.md
                    - Panel Selection Protocol: doc/normative/50-constitutional-ops/PANEL-SELECTION-PROTOCOL.md
                    - Procedural Reputation Spec: doc/normative/50-constitutional-ops/PROCEDURAL-REPUTATION-SPEC.md
                    - Raw Signal Policy: doc/normative/50-constitutional-ops/RAW-SIGNAL-POLICY.md
                    - Reputation Validation Protocol: doc/normative/50-constitutional-ops/REPUTATION-VALIDATION-PROTOCOL.md
