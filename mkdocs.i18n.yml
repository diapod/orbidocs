                    - Corpus Entry v1: doc/schemas-gen/schemas/corpus-entry.v1.md
                    - Curation Decision v1: doc/schemas-gen/schemas/curation-decision.v1.md
                    - Eval Report v1: doc/schemas-gen/schemas/eval-report.v1.md
