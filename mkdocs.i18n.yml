                    - Unseal Case Model: doc/normative/50-constitutional-ops/UNSEAL-CASE-MODEL.md
          # BEGIN GENERATED PROJECT NAV EN
          # Project nav is generated into mkdocs.i18n.generated.yml from doc/project/*/.nav.yml.
          # END GENERATED PROJECT NAV EN
            - Supplementary:
                - doc/normative/90-supplementary/SUPPLEMENTARY.md
                - AI Manifesto: doc/normative/90-supplementary/AI-MANIFESTO.md
            - Schemas:
                - Schema Metadata Convention: doc/schemas/README.md
