                    - Question Envelope v1: doc/schemas-gen/schemas/question-envelope.v1.md
                    - Retrieval Request v1: doc/schemas-gen/schemas/retrieval-request.v1.md
                    - Retrieval Response v1: doc/schemas-gen/schemas/retrieval-response.v1.md
                    - Response Envelope v1: doc/schemas-gen/schemas/response-envelope.v1.md
                    - Signal Marker v1: doc/schemas-gen/schemas/signal-marker.v1.md
                    - Signal Transform Event v1: doc/schemas-gen/schemas/signal-transform-event.v1.md
                    - Transcript Bundle v1: doc/schemas-gen/schemas/transcript-bundle.v1.md
                    - Transcript Segment v1: doc/schemas-gen/schemas/transcript-segment.v1.md
                    - Training Job v1: doc/schemas-gen/schemas/training-job.v1.md
                    - UBC Allocation v1: doc/schemas-gen/schemas/ubc-allocation.v1.md
